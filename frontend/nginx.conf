server {
    listen 80;
    
    # Serve static React files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Crucial for React Router (SPA fallback)
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests dynamically to the backend container
    location /auth/ {
        proxy_pass http://backend:8000/auth/;
        proxy_set_header Host $host;
    }
    location /upload {
        proxy_pass http://backend:8000/upload;
        proxy_set_header Host $host;
    }
    location /query {
        proxy_pass http://backend:8000/query;
        proxy_set_header Host $host;
    }
    location /collections {
        proxy_pass http://backend:8000/collections;
        proxy_set_header Host $host;
    }
    location /evaluate {
        proxy_pass http://backend:8000/evaluate;
        proxy_set_header Host $host;
    }
}
